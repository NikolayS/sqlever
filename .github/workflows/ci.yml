name: CI

on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - run: bun test tests/unit/

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [14, 15, 16, 17, 18]
        include:
          - pg: 14
            port: 5414
          - pg: 15
            port: 5415
          - pg: 16
            port: 5416
          - pg: 17
            port: 5417
          - pg: 18
            port: 5418
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - ${{ matrix.port }}:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - name: Run integration tests
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "${{ matrix.port }}"
          TEST_PG_USER: postgres
          TEST_PG_PASS: test
        run: bun test tests/integration/

  compat:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5418:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - name: Pull Sqitch Docker image
        run: docker pull sqitch/sqitch:latest
      - name: Run compatibility tests
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5418"
          TEST_PG_USER: postgres
          TEST_PG_PASS: test
        run: bun test tests/compat/ --timeout 180000

  pgtap:
    name: pgTAP (PG18)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5418:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Cache pgTAP build
        uses: actions/cache@v4
        id: pgtap-cache
        with:
          path: /tmp/pgtap
          key: pgtap-v1.3.3-pg18-${{ runner.os }}
      - name: Install pgTAP
        run: |
          # Add PostgreSQL PGDG apt repo (ubuntu-latest doesn't have PG18 by default)
          sudo apt-get install -y -qq curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt \
            $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            postgresql-client-18 \
            postgresql-server-dev-18 \
            libtap-parser-sourcehandler-pgtap-perl \
            cpanminus \
            build-essential
          sudo cpanm --quiet TAP::Parser::SourceHandler::pgTAP
          if [ "${{ steps.pgtap-cache.outputs.cache-hit }}" != "true" ]; then
            git clone --depth 1 --branch v1.3.3 \
              https://github.com/theory/pgtap.git /tmp/pgtap
            cd /tmp/pgtap && make
          fi
          PGPASSWORD=test psql -h localhost -p 5418 -U postgres \
            -f /tmp/pgtap/sql/pgtap.sql
      - name: Run pgTAP tests
        env:
          PGPASSWORD: test
        run: |
          pg_prove -h localhost -p 5418 -U postgres -d postgres \
            tests/pgtap/ --verbose --timer


  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - run: bun run build
      - name: Smoke test — verify binary runs
        run: |
          ./dist/sqlever --version
          ./dist/sqlever --version | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'
      - name: Smoke test — verify libpg-query WASM parses SQL
        run: |
          ./dist/sqlever analyze tests/fixtures/edge-cases.sql --format json || true
